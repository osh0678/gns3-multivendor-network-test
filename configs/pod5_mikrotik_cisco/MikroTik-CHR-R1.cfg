! === MikroTik RouterOS - MikroTik-CHR-R1 ===
/system identity set name=MikroTik-CHR-R1
#
# --- Physical Interface 활성화 ---
/interface ethernet set ether2 disabled=no
/interface ethernet set ether3 disabled=no
#
# --- VLAN 인터페이스 생성 ---
/interface vlan add interface=ether2 name=vlan90 vlan-id=90
/interface vlan add interface=ether3 name=vlan100 vlan-id=100
#
# --- IP 주소 할당 ---
/ip address add address=10.5.90.1/24 interface=vlan90
/ip address add address=10.5.100.1/24 interface=vlan100
/ip address add address=10.5.0.1 interface=lo
#
# --- IP 라우팅 활성화 ---
/ip settings set ip-forward=yes
#
# --- 방화벽 기본 정책 (ping 허용) ---
/ip firewall filter add chain=input protocol=icmp action=accept
/ip firewall filter add chain=forward protocol=icmp action=accept
